name: Liquid bait station — stamp sync and STL export

on:
  push:
    branches: [ "main" ]
    paths:
      - "3d-models/liquid-bait-station/**"
      - ".github/workflows/liquid-bait-station-stamp-export.yml"
  workflow_dispatch:

jobs:
  export-stls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenSCAD and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openscad jq

      - name: Regenerate stamp and export STLs
        working-directory: 3d-models/liquid-bait-station
        run: |
          chmod +x scripts/export-open-scad-stl.sh
          ./scripts/export-open-scad-stl.sh

      - name: Upload STLs
        uses: actions/upload-artifact@v4
        with:
          name: liquid-bait-station-stls
          path: |
            3d-models/liquid-bait-station/latest-builds/**/*.stl
            3d-models/liquid-bait-station/latest-builds/**/*.md
