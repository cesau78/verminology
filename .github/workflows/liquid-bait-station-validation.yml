# Smoke-test that v2 clam-shell SCAD renders (fast mesh_preview; full mesh uses stamp-export / production workflows).

name: Liquid Bait Station Validation

on:
  push:
    branches: [ "main" ]
    paths:
      - "3d-models/liquid-bait-station/**"
      - ".github/workflows/liquid-bait-station-validation.yml"

jobs:
  validate-scad:
    runs-on: ubuntu-latest
    container:
      image: openscad/openscad:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Artifact upload runs on the host; only the workspace mount is visible there (not container /tmp).
      - name: Render v2 assembly (smoke test)
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/3d-models/liquid-bait-station/.ci-validation"
          mkdir -p "$OUT_DIR"
          openscad -o "$OUT_DIR/v2-assembly.stl" \
            -D "mesh_preview=true" -D "crosssection_view=false" \
            "$GITHUB_WORKSPACE/3d-models/liquid-bait-station/v2-clam-shell/assembly.scad"

      - name: Upload validation STL
        uses: actions/upload-artifact@v4
        with:
          name: liquid-bait-station-v2-assembly-validation
          path: 3d-models/liquid-bait-station/.ci-validation/v2-assembly.stl
