# Production STL export: mesh_preview=false ($fn=128), output under latest-builds/<product_version>/,
# stamp without "Prototype". Set LBS_PRODUCTION=1 (see scripts/export-open-scad-stl.sh).
#
# Run against the ref that matches the release (usually tag v2.4.0 after you tag that commit).

name: Liquid bait station — production STL export

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (release tag, branch, or SHA)"
        required: true
        type: string
        default: "main"
      verify_product_version:
        description: "Optional — fail unless print-stamp-config.json product_version equals this (e.g. v2.4.0)"
        required: false
        type: string
        default: ""

jobs:
  production-stls:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Verify product_version
        if: inputs.verify_product_version != ''
        working-directory: 3d-models/liquid-bait-station
        run: |
          cfg="$(jq -r '.product_version' print-stamp-config.json | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          want="$(echo "${{ inputs.verify_product_version }}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [[ "$cfg" != "$want" ]]; then
            echo "::error::print-stamp-config.json has product_version='$cfg', expected '$want'"
            exit 1
          fi
          echo "product_version matches: $cfg"

      - name: Install OpenSCAD and jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openscad jq

      - name: Export production STLs
        working-directory: 3d-models/liquid-bait-station
        env:
          LBS_PRODUCTION: "1"
        run: |
          chmod +x scripts/export-open-scad-stl.sh
          ./scripts/export-open-scad-stl.sh

      - name: Upload production STLs
        uses: actions/upload-artifact@v4
        with:
          name: liquid-bait-station-production-stls
          path: |
            3d-models/liquid-bait-station/latest-builds/**/*.stl
            3d-models/liquid-bait-station/stamp_generated.scad
